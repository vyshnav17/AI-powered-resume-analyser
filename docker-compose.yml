version: '3.8'

services:
  api-gateway:
    build: 
      context: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    depends_on:
      - user-service
      - analyzer-service
      - report-service
      - notification-service

  user-service:
    build: 
      context: ./user-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=super_secret_jwt_key_123

  analyzer-service:
    build: 
      context: ./analyzer-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - GROQ_API_KEY=${GROQ_API_KEY}

  report-service:
    build: 
      context: ./report-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - ANALYZER_SERVICE_URL=http://analyzer-service:5002

  notification-service:
    build: 
      context: ./notification-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
